<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="relative min-h-screen overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(16,185,129,0.18),transparent_40%),radial-gradient(circle_at_80%_0%,rgba(56,189,248,0.2),transparent_35%),linear-gradient(to_bottom,#f8fafc,#e2e8f0)]"></div>

      <main class="relative mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
        <section class="rounded-3xl border border-white/60 bg-white/80 p-6 shadow-xl backdrop-blur">
          <header class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold tracking-tight text-slate-800 sm:text-3xl">{{ title }}</h1>
            <div class="flex items-center gap-2 rounded-full bg-slate-900/90 px-3 py-1.5 text-sm text-white">
              <span id="header-dot" class="h-2.5 w-2.5 rounded-full bg-emerald-400"></span>
              <span id="header-status">在线</span>
            </div>
          </header>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <article class="rounded-2xl border border-emerald-200 bg-emerald-50/80 p-5 shadow-sm">
              <p class="text-sm font-medium text-emerald-700">运行状态</p>
              <p id="status-value" class="mt-3 text-3xl font-semibold text-emerald-800">加载中...</p>
            </article>

            <article class="rounded-2xl border border-sky-200 bg-sky-50/80 p-5 shadow-sm">
              <p class="text-sm font-medium text-sky-700">当前任务</p>
              <p id="task-value" class="mt-3 text-xl font-semibold text-sky-900">加载中...</p>
            </article>

            <article class="rounded-2xl border border-amber-200 bg-amber-50/80 p-5 shadow-sm">
              <p class="text-sm font-medium text-amber-700">活跃会话数</p>
              <p id="sessions-value" class="mt-3 text-4xl font-bold text-amber-800">0</p>
            </article>

            <article class="rounded-2xl border border-indigo-200 bg-indigo-50/80 p-5 shadow-sm">
              <p class="text-sm font-medium text-indigo-700">已加载技能数</p>
              <p id="skills-value" class="mt-3 text-4xl font-bold text-indigo-800">0</p>
            </article>
          </div>

          <p class="mt-6 text-right text-xs text-slate-500">
            自动刷新：每 5 秒
            <span id="refresh-time" class="ml-2 font-medium text-slate-600">--:--:--</span>
          </p>
        </section>
      </main>
    </div>

    <script>
      const els = {
        status: document.getElementById("status-value"),
        task: document.getElementById("task-value"),
        sessions: document.getElementById("sessions-value"),
        skills: document.getElementById("skills-value"),
        headerStatus: document.getElementById("header-status"),
        headerDot: document.getElementById("header-dot"),
        refreshTime: document.getElementById("refresh-time"),
      };

      function setStatusUI(status) {
        const online = status === "online";
        els.status.textContent = online ? "在线" : "离线";
        els.headerStatus.textContent = online ? "在线" : "离线";
        els.headerDot.className = `h-2.5 w-2.5 rounded-full ${online ? "bg-emerald-400" : "bg-rose-400"}`;
      }

      function formatTime(date) {
        return date.toLocaleTimeString("zh-CN", { hour12: false });
      }

      async function refreshDashboard() {
        try {
          const res = await fetch("/api/dashboard", { cache: "no-store" });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          setStatusUI(data.status || "offline");
          els.task.textContent = data.current_task || "暂无任务";
          els.sessions.textContent = String(data.active_sessions ?? 0);
          els.skills.textContent = String(data.loaded_skills ?? 0);
          els.refreshTime.textContent = formatTime(new Date());
        } catch (error) {
          setStatusUI("offline");
          els.task.textContent = "数据获取失败";
          els.sessions.textContent = "0";
          els.skills.textContent = "0";
          els.refreshTime.textContent = `${formatTime(new Date())} (错误)`;
          console.error("Failed to refresh dashboard:", error);
        }
      }

      refreshDashboard();
      setInterval(refreshDashboard, 5000);
    </script>
  </body>
</html>
